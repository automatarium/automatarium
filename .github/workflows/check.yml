name: CI tests
on: 
  push:
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          check-latest: true
          cache: 'yarn'
      
      - name: Set up latest Yarn
        run: yarn set version latest

      - name: Install Yarn Dependencies
        run: yarn

      - name: Build project
        run: yarn build

      - name: Check TS types
        run: yarn check:types

      - name: Run Linter
        run: yarn lint

      - name: Run Tests
        run: yarn test
